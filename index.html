<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#1f4e78">
  <meta name="description" content="停車位租客、入帳、待分配與收入查詢管理。">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="停車位管理">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <title>停車位收入管理</title>
  <style>
    :root {
      --primary: #1f4e78;
      --surface: #ffffff;
      --background: #f4f7fa;
      --text: #1f2937;
      --muted: #667085;
      --danger: #b42318;
      --success: #16794b;
    }

    * { box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", "Microsoft JhengHei", sans-serif;
      color: var(--text);
      background: var(--background);
    }

    body {
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
    }

    .shell {
      display: grid;
      grid-template-rows: auto 1fr;
      width: 100%;
      height: 100%;
    }

    .topbar {
      display: flex;
      align-items: center;
      gap: 10px;
      min-height: 52px;
      padding: 7px 10px;
      color: #fff;
      background: linear-gradient(135deg, #173f63, #2f6e9e);
      box-shadow: 0 2px 10px rgba(16, 24, 40, .18);
      z-index: 10;
    }

    .brand {
      flex: 1;
      min-width: 0;
    }

    .brand strong, .brand span {
      display: block;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .brand strong { font-size: 15px; }
    .brand span { margin-top: 2px; font-size: 11px; opacity: .86; }

    .topbar button, .topbar a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 38px;
      min-height: 38px;
      padding: 0 10px;
      border: 1px solid rgba(255, 255, 255, .42);
      border-radius: 10px;
      color: #fff;
      background: rgba(255, 255, 255, .10);
      font-size: 13px;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
    }

    #installButton { display: none; }
    #installButton.visible { display: inline-flex; }

    .stage { position: relative; min-height: 0; background: #fff; }

    #appFrame {
      width: 100%;
      height: 100%;
      border: 0;
      background: #fff;
    }

    .panel {
      position: absolute;
      inset: 0;
      z-index: 5;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 22px;
      background: var(--background);
    }

    .panel.visible { display: flex; }

    .panel-card {
      width: min(100%, 460px);
      padding: 24px;
      border: 1px solid #d0d5dd;
      border-radius: 18px;
      background: var(--surface);
      box-shadow: 0 14px 38px rgba(16, 24, 40, .12);
      text-align: center;
    }

    .panel-card img { width: 82px; height: 82px; border-radius: 20px; }
    .panel-card h1 { margin: 16px 0 8px; font-size: 22px; color: var(--primary); }
    .panel-card p { margin: 0 0 16px; color: var(--muted); line-height: 1.65; }

    .url-input {
      width: 100%;
      min-height: 48px;
      margin-bottom: 10px;
      padding: 10px 12px;
      border: 1px solid #98a2b3;
      border-radius: 10px;
      font-size: 15px;
    }

    .primary, .secondary {
      width: 100%;
      min-height: 48px;
      margin-top: 9px;
      border-radius: 11px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }

    .primary { border: 0; color: #fff; background: var(--primary); }
    .secondary { border: 1px solid #98a2b3; color: var(--text); background: #fff; }

    .status-line {
      min-height: 24px;
      margin-top: 10px;
      color: var(--danger);
      font-size: 13px;
      line-height: 1.5;
    }

    .offline-badge {
      display: none;
      padding: 5px 8px;
      border-radius: 999px;
      color: #7a271a;
      background: #fef3f2;
      font-size: 11px;
      font-weight: 800;
    }

    .offline-badge.visible { display: inline-block; }

    @media (max-width: 460px) {
      .topbar { min-height: 48px; padding: 5px 7px; }
      .brand strong { font-size: 14px; }
      .brand span { display: none; }
      .topbar button, .topbar a { min-width: 36px; min-height: 36px; padding: 0 8px; }
      .panel { padding: 14px; }
      .panel-card { padding: 20px 16px; }
    }

    @media (display-mode: standalone) {
      .brand span { display: block; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <div class="brand">
        <strong id="appTitle">停車位收入管理</strong>
        <span>V6.8 PWA｜正式 Apps Script 管理頁</span>
      </div>
      <span id="offlineBadge" class="offline-badge">離線</span>
      <button id="installButton" type="button">安裝</button>
      <button type="button" title="重新整理" aria-label="重新整理" onclick="reloadApp()">↻</button>
      <a id="openOriginal" href="#" target="_blank" rel="noopener" title="直接開啟正式頁面">開啟</a>
    </header>

    <main class="stage">
      <iframe
        id="appFrame"
        title="停車位管理正式頁面"
        referrerpolicy="strict-origin-when-cross-origin"
        allow="clipboard-read; clipboard-write"
      ></iframe>

      <section id="configPanel" class="panel">
        <div class="panel-card">
          <img src="icons/icon-192.png" alt="停車位管理 App 圖示">
          <h1>設定正式管理網址</h1>
          <p>第一次使用請貼上 Apps Script 正式部署的 <strong>/exec</strong> 網址。本設定只保存在這個裝置。</p>
          <input id="urlInput" class="url-input" type="url" inputmode="url" placeholder="https://script.google.com/macros/s/.../exec">
          <button class="primary" type="button" onclick="saveAppUrl()">儲存並開啟</button>
          <div id="configStatus" class="status-line"></div>
        </div>
      </section>

      <section id="offlinePanel" class="panel">
        <div class="panel-card">
          <img src="icons/icon-192.png" alt="停車位管理 App 圖示">
          <h1>目前沒有網路</h1>
          <p>為保護租客與交易資料，本 PWA 不離線保存正式資料。恢復網路後即可繼續操作。</p>
          <button class="primary" type="button" onclick="reloadApp()">重新連線</button>
          <button class="secondary" type="button" onclick="showConfig()">變更正式網址</button>
        </div>
      </section>
    </main>
  </div>

  <script src="app-config.js"></script>
  <script>
    const STORAGE_KEY = "parkingAppsScriptUrl";
    const frame = document.getElementById("appFrame");
    const configPanel = document.getElementById("configPanel");
    const offlinePanel = document.getElementById("offlinePanel");
    const openOriginal = document.getElementById("openOriginal");
    const offlineBadge = document.getElementById("offlineBadge");
    const installButton = document.getElementById("installButton");
    let deferredInstallPrompt = null;

    function normalizeAppsScriptUrl(value) {
      const url = String(value || "").trim();
      if (!url) return "";
      try {
        const parsed = new URL(url);
        const validHost = parsed.hostname === "script.google.com";
        const validPath = /^\/macros\/s\/[^/]+\/(exec|dev)$/.test(parsed.pathname);
        if (!validHost || !validPath) return "";
        parsed.searchParams.set("pwa", "1");
        return parsed.toString();
      } catch (error) {
        return "";
      }
    }

    function configuredUrl() {
      const saved = localStorage.getItem(STORAGE_KEY) || "";
      const fileConfig = window.PARKING_PWA_CONFIG || {};
      return normalizeAppsScriptUrl(saved || fileConfig.appsScriptUrl || "");
    }

    function loadApp() {
      const url = configuredUrl();
      updateNetworkState();

      if (!url) {
        showConfig();
        return;
      }

      openOriginal.href = url.replace(/[?&]pwa=1(?:&|$)/, function (match) {
        return match.endsWith("&") ? "?" : "";
      }).replace(/[?&]$/, "");
      configPanel.classList.remove("visible");

      if (!navigator.onLine) {
        offlinePanel.classList.add("visible");
        return;
      }

      offlinePanel.classList.remove("visible");
      if (frame.src !== url) frame.src = url;
    }

    function saveAppUrl() {
      const input = document.getElementById("urlInput");
      const status = document.getElementById("configStatus");
      const url = normalizeAppsScriptUrl(input.value);
      if (!url) {
        status.textContent = "網址格式不正確，必須是 Apps Script 的 /exec 正式部署網址。";
        return;
      }
      localStorage.setItem(STORAGE_KEY, url.replace(/[?&]pwa=1(?:&|$)/, ""));
      status.textContent = "";
      loadApp();
    }

    function showConfig() {
      offlinePanel.classList.remove("visible");
      configPanel.classList.add("visible");
      const current = configuredUrl();
      document.getElementById("urlInput").value = current.replace(/[?&]pwa=1(?:&|$)/, "");
      document.getElementById("configStatus").textContent = "";
    }

    function reloadApp() {
      if (!navigator.onLine) {
        updateNetworkState();
        return;
      }
      const url = configuredUrl();
      if (!url) {
        showConfig();
        return;
      }
      frame.src = "about:blank";
      window.setTimeout(function () { frame.src = url; }, 80);
      offlinePanel.classList.remove("visible");
    }

    function updateNetworkState() {
      const offline = !navigator.onLine;
      offlineBadge.classList.toggle("visible", offline);
      if (offline) {
        offlinePanel.classList.add("visible");
      } else {
        offlinePanel.classList.remove("visible");
      }
    }

    window.addEventListener("online", function () {
      updateNetworkState();
      loadApp();
    });
    window.addEventListener("offline", updateNetworkState);

    window.addEventListener("beforeinstallprompt", function (event) {
      event.preventDefault();
      deferredInstallPrompt = event;
      installButton.classList.add("visible");
    });

    installButton.addEventListener("click", async function () {
      if (!deferredInstallPrompt) return;
      deferredInstallPrompt.prompt();
      await deferredInstallPrompt.userChoice;
      deferredInstallPrompt = null;
      installButton.classList.remove("visible");
    });

    window.addEventListener("appinstalled", function () {
      installButton.classList.remove("visible");
    });

    if ("serviceWorker" in navigator) {
      window.addEventListener("load", function () {
        navigator.serviceWorker.register("service-worker.js").catch(function (error) {
          console.error("Service Worker 註冊失敗：", error);
        });
      });
    }

    loadApp();
  </script>
</body>
</html>
