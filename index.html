<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#1f4e78">
  <meta name="description" content="停車位租客、入帳、待分配與收入查詢管理。">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="停車位管理">

  <link rel="manifest" href="manifest.webmanifest?v=1.2">
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png?v=1.2">
  <link rel="apple-touch-icon-precomposed" sizes="180x180" href="apple-touch-icon.png?v=1.2">
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png?v=1.2">
  <link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512.png?v=1.2">

  <title>停車位管理</title>

  <style>
    :root {
      --primary: #1f4e78;
      --primary2: #2f6e9e;
      --surface: #ffffff;
      --background: #f4f7fa;
      --text: #1f2937;
      --muted: #667085;
      --danger: #b42318;
      --success: #16794b;
    }

    * { box-sizing: border-box; }

    html, body {
      min-height: 100%;
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI",
                   "Noto Sans TC", "Microsoft JhengHei", sans-serif;
      color: var(--text);
      background: var(--background);
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding:
        calc(24px + env(safe-area-inset-top))
        18px
        calc(24px + env(safe-area-inset-bottom));
    }

    .card {
      width: min(100%, 460px);
      padding: 30px 22px;
      border: 1px solid #d0d5dd;
      border-radius: 24px;
      background: var(--surface);
      box-shadow: 0 18px 48px rgba(16, 24, 40, .14);
      text-align: center;
    }

    .app-icon {
      width: 112px;
      height: 112px;
      border-radius: 25px;
      box-shadow: 0 8px 22px rgba(31, 78, 120, .20);
    }

    h1 {
      margin: 18px 0 8px;
      color: var(--primary);
      font-size: 26px;
    }

    p {
      margin: 0 0 18px;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.7;
    }

    .instruction {
      margin: 18px 0;
      padding: 14px 16px;
      border-radius: 14px;
      background: #eef5fb;
      color: #173f63;
      text-align: left;
      line-height: 1.75;
    }

    button {
      width: 100%;
      min-height: 52px;
      margin-top: 10px;
      border: 0;
      border-radius: 13px;
      color: #ffffff;
      background: linear-gradient(135deg, var(--primary), var(--primary2));
      font-size: 17px;
      font-weight: 800;
      cursor: pointer;
    }

    button.secondary {
      color: var(--text);
      background: #ffffff;
      border: 1px solid #98a2b3;
    }

    .config {
      display: none;
      margin-top: 18px;
    }

    .config.visible {
      display: block;
    }

    input {
      width: 100%;
      min-height: 50px;
      padding: 10px 12px;
      border: 1px solid #98a2b3;
      border-radius: 11px;
      font-size: 15px;
    }

    .status {
      min-height: 24px;
      margin-top: 10px;
      color: var(--danger);
      font-size: 14px;
      line-height: 1.5;
    }

    .small {
      margin-top: 16px;
      color: var(--muted);
      font-size: 13px;
    }

    .loading {
      display: none;
    }

    .loading.visible {
      display: block;
    }

    .spinner {
      width: 34px;
      height: 34px;
      margin: 14px auto;
      border: 4px solid #dbe8f3;
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>

<body>
  <main class="card">
    <img class="app-icon" src="apple-touch-icon.png?v=1.2" alt="停車位管理圖示">
    <h1>停車位管理</h1>

    <section id="normalPanel">
      <p>此頁是手機主畫面的啟動入口，不再內嵌 Google Apps Script，因此不會再出現內嵌頁面的 403 錯誤。</p>

      <div class="instruction">
        iPhone 安裝方式：<br>
        1. 使用 Safari 開啟本頁<br>
        2. 點下方「分享」<br>
        3. 選擇「加入主畫面」
      </div>

      <button type="button" onclick="openOfficial()">開啟正式停車位管理</button>
      <button class="secondary" type="button" onclick="showConfig()">變更正式網址</button>
    </section>

    <section id="loadingPanel" class="loading">
      <div class="spinner"></div>
      <p>正在開啟正式停車位管理……</p>
      <button type="button" onclick="openOfficial()">立即開啟</button>
    </section>

    <section id="configPanel" class="config">
      <p>請貼上 Apps Script 正式部署的 <strong>/exec</strong> 網址。</p>
      <input id="urlInput" type="url" inputmode="url"
             placeholder="https://script.google.com/macros/s/.../exec">
      <button type="button" onclick="saveOfficialUrl()">儲存</button>
      <button class="secondary" type="button" onclick="hideConfig()">取消</button>
      <div id="status" class="status"></div>
    </section>

    <div class="small">PWA Launcher V1.2｜正式資料不會儲存在此頁</div>
  </main>

  <script src="app-config.js?v=1.2"></script>
  <script>
    const STORAGE_KEY = "parkingAppsScriptUrl";
    const normalPanel = document.getElementById("normalPanel");
    const loadingPanel = document.getElementById("loadingPanel");
    const configPanel = document.getElementById("configPanel");
    const urlInput = document.getElementById("urlInput");
    const statusLine = document.getElementById("status");

    function normalizeAppsScriptUrl(value) {
      const url = String(value || "").trim();
      if (!url) return "";

      try {
        const parsed = new URL(url);
        const validHost = parsed.hostname === "script.google.com";
        const validPath = /^\/macros\/s\/[^/]+\/(exec|dev)$/.test(parsed.pathname);

        if (!validHost || !validPath) return "";
        return parsed.toString();
      } catch (error) {
        return "";
      }
    }

    function configuredUrl() {
      const saved = localStorage.getItem(STORAGE_KEY) || "";
      const fileConfig = window.PARKING_PWA_CONFIG || {};
      return normalizeAppsScriptUrl(saved || fileConfig.appsScriptUrl || "");
    }

    function openOfficial() {
      const url = configuredUrl();
      if (!url) {
        showConfig();
        statusLine.textContent = "尚未設定正式 Apps Script 網址。";
        return;
      }

      loadingPanel.classList.add("visible");
      normalPanel.style.display = "none";
      configPanel.classList.remove("visible");

      // Top-level navigation replaces the blocked cross-origin iframe.
      window.location.assign(url);
    }

    function showConfig() {
      normalPanel.style.display = "none";
      loadingPanel.classList.remove("visible");
      configPanel.classList.add("visible");
      urlInput.value = configuredUrl();
      statusLine.textContent = "";
    }

    function hideConfig() {
      configPanel.classList.remove("visible");
      normalPanel.style.display = "";
      statusLine.textContent = "";
    }

    function saveOfficialUrl() {
      const url = normalizeAppsScriptUrl(urlInput.value);
      if (!url) {
        statusLine.textContent = "網址格式不正確，必須是 Apps Script 的 /exec 正式部署網址。";
        return;
      }

      localStorage.setItem(STORAGE_KEY, url);
      statusLine.textContent = "";
      normalPanel.style.display = "";
      configPanel.classList.remove("visible");
    }

    function isStandalone() {
      return window.matchMedia("(display-mode: standalone)").matches ||
             window.navigator.standalone === true;
    }

    function shouldAutoLaunch() {
      const query = new URLSearchParams(window.location.search);
      return isStandalone() || query.get("launch") === "1";
    }

    if (shouldAutoLaunch() && configuredUrl()) {
      loadingPanel.classList.add("visible");
      normalPanel.style.display = "none";
      window.setTimeout(openOfficial, 250);
    }

    if ("serviceWorker" in navigator) {
      window.addEventListener("load", function () {
        navigator.serviceWorker.register("service-worker.js?v=1.2")
          .catch(function (error) {
            console.error("Service Worker 註冊失敗：", error);
          });
      });
    }
  </script>
</body>
</html>
